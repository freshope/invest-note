name: Deploy Admin

# admin(static-export SPA) 을 빌드 → private registry 푸시 → Coolify 배포.
# admin-v* 태그(devtools:release 가 생성)에서만 배포한다. workflow_dispatch 는 빌드 검증 전용
# (브랜치 ref 에서 돌면 배포·:latest 갱신은 가드로 차단 → 운영 admin 오염 방지).
on:
  push:
    tags: ["admin-v*"]
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # ref = admin-v1.2.3 (태그 push) 또는 브랜치명(workflow_dispatch)
          echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # :latest 는 admin-v* 태그에서만 갱신(브랜치 dispatch 가 운영 핸들을 덮지 않게).
          if [[ "${GITHUB_REF}" == refs/tags/admin-v* ]]; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./admin/Dockerfile
          platforms: linux/amd64
          # public 값(빌드 타임에 구워짐) → repo Variables. 비밀 아님.
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.ADMIN_API_BASE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.ADMIN_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.ADMIN_SUPABASE_PUBLISHABLE_KEY }}
          provenance: false
          sbom: false
          outputs: type=registry
          # build-push-action 은 빈 줄을 무시 → latest 가 아닐 때 latest 줄 자동 생략.
          tags: |
            ${{ secrets.REGISTRY_URL }}/invest-note-admin:${{ steps.meta.outputs.sha }}
            ${{ secrets.REGISTRY_URL }}/invest-note-admin:${{ steps.meta.outputs.ref }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/invest-note-admin:latest', secrets.REGISTRY_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        # admin-v* 태그로 이미지가 올라간 직후에만 배포. 브랜치 dispatch 는 빌드 검증까지만.
        if: startsWith(github.ref, 'refs/tags/admin-v')
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_ADMIN_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl --fail-with-body -sS \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false" \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN"
